
model:
  name: "LagrangianLM-150M"
  architecture: "decoder_only_transformer"
  parameter_target: "150M"

  
  # Vocabulary / Token Embeddings
  
  vocab_size: 32000
  hidden_size: 768
  max_position_embeddings: 2048

  
  # Transformer Decoder
  
  num_hidden_layers: 16
  num_attention_heads: 12
  num_key_value_heads: 12

  
  # Feed Forward Network
  # LLaMA uses SwiGLU, so intermediate size is usually larger
  # than standard Transformer FFN.
  
  intermediate_size: 2048
  hidden_act: "swiglu"

  
  # Normalization
  
  norm_type: "rmsnorm"
  rms_norm_eps: 1.0e-6

  
  # Positional Encoding
  
  position_encoding: "rope"
  rope_theta: 10000.0

  
  # Attention
  
  attention_type: "causal_self_attention"
  attention_dropout: 0.0
  use_bias: false

  
  # Regularization
  
  hidden_dropout: 0.0

  
  # Initialization
  
  initializer_range: 0.02

  
  # Output Head
  
  tie_word_embeddings: true

  
  # Precision / Implementation
  
  torch_dtype: "bfloat16"